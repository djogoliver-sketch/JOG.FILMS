document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

lay:flex;align-items:center;gap:10px;font-size:13px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#260708;margin-bottom:clamp(20px,3vw,40px);\">\n          <span style=\"width:8px;height:8px;border-radius:50%;background:var(--accent,#a4262a);display:inline-block;\"><\u002Fspan>Sobre\n        <\u002Fdiv>\n        <p style=\"font-family:'Newsreader',serif;font-style:italic;font-size:clamp(30px,4vw,60px);line-height:1.04;color:#260708;margin:0;\">Imagens que ficam na memória.<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <p style=\"font-size:clamp(16px,1.35vw,21px);line-height:1.6;color:#e9cfcd;margin:0 0 22px;max-width:52ch;\">JOG Films é uma produtora audiovisual. Criamos filmes, reels e campanhas — da direção à edição — com um olhar autoral e cinematográfico.<\u002Fp>\n        <p style=\"font-size:clamp(16px,1.35vw,21px);line-height:1.6;color:#cfa3a1;margin:0;max-width:52ch;\">Cada projeto é tratado como uma história única, do roteiro à entrega final. Veja o portfólio Verão 26 abaixo.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section id=\"projetos\" style=\"padding:clamp(40px,5vw,90px) clamp(20px,5vw,80px) clamp(70px,9vw,140px);border-top:1px solid rgba(38,7,8,0.4);scroll-margin-top:80px;\">\n    <div style=\"display:flex;justify-content:space-between;align-items:flex-end;gap:20px;flex-wrap:wrap;margin-bottom:clamp(28px,4vw,56px);\">\n      <h2 style=\"font-weight:900;font-size:clamp(44px,8vw,120px);line-height:0.9;letter-spacing:-0.02em;text-transform:uppercase;color:#260708;margin:0;\">Projetos<\u002Fh2>\n      <span style=\"font-size:13px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:#260708;\">04 — Selecionados 2026<\u002Fspan>\n    <\u002Fdiv>\n\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,360px),1fr));gap:clamp(16px,2vw,30px);\">\n      <sc-for list=\"{{ projects }}\" as=\"p\" hint-placeholder-count=\"4\">\n        <a href=\"{{ p.watch }}\" target=\"_blank\" rel=\"noopener\" style=\"display:flex;flex-direction:column;gap:12px;text-decoration:none;\">\n          <div style=\"position:relative;width:100%;padding-top:56.25%;background:#060708;border-radius:2px;overflow:hidden;transition:box-shadow .4s ease;\" style-hover=\"box-shadow:0 22px 55px rgba(0,0,0,0.45);\">\n            <img src=\"{{ p.poster }}\" style=\"position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform .55s ease;\" style-hover=\"transform:scale(1.06);\">\n            <div style=\"position:absolute;inset:0;background:linear-gradient(180deg,rgba(8,10,14,0.05) 40%,rgba(8,10,14,0.4) 100%);\"><\u002Fdiv>\n            <span style=\"position:absolute;top:12px;left:14px;font-weight:800;font-size:14px;letter-spacing:0.04em;color:rgba(255,255,255,0.92);text-shadow:0 1px 6px rgba(0,0,0,0.5);\">{{ p.num }}<\u002Fspan>\n            <div style=\"position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;\">\n              <svg width=\"62\" height=\"62\" viewBox=\"0 0 62 62\" fill=\"none\"><circle cx=\"31\" cy=\"31\" r=\"29.5\" stroke=\"var(--accent,#a4262a)\" stroke-width=\"2\"><\u002Fcircle><path d=\"M26 21 L43 31 L26 41 Z\" fill=\"var(--accent,#a4262a)\"><\u002Fpath><\u002Fsvg>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;justify-content:space-between;align-items:center;font-size:13px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:#260708;\">\n            <span>{{ p.label }}<\u002Fspan><span style=\"color:var(--accent,#a4262a);\">YouTube →<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fa>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section id=\"contato\" style=\"padding:clamp(60px,8vw,130px) clamp(20px,5vw,80px) clamp(36px,4vw,56px);border-top:1px solid rgba(38,7,8,0.4);scroll-margin-top:80px;\">\n    <div style=\"font-family:'Newsreader',serif;font-style:italic;font-size:clamp(22px,2.6vw,34px);color:#260708;margin-bottom:clamp(16px,2vw,28px);\">Vamos conversar<\u002Fdiv>\n    <a href=\"{{ emailHref }}\" style=\"display:block;font-weight:900;font-size:clamp(26px,6vw,92px);line-height:0.98;letter-spacing:-0.02em;color:#260708;text-decoration:none;word-break:break-word;margin-bottom:clamp(28px,4vw,52px);\" style-hover=\"color:var(--accent,#a4262a);\">djog.oliver@gmail.com<\u002Fa>\n    <div style=\"display:flex;gap:clamp(20px,4vw,48px);flex-wrap:wrap;font-size:15px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;\">\n      <a href=\"{{ igUrl }}\" target=\"_blank\" rel=\"noopener\" style=\"color:#e9cfcd;text-decoration:none;\" style-hover=\"color:#fff;\">Instagram — @jog.films<\u002Fa>\n      <a href=\"{{ emailHref }}\" style=\"color:#e9cfcd;text-decoration:none;\" style-hover=\"color:#fff;\">E-mail<\u002Fa>\n    <\u002Fdiv>\n    <div style=\"display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap;border-top:1px solid rgba(38,7,8,0.45);margin-top:clamp(40px,6vw,90px);padding-top:16px;font-size:13px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:#260708;\">\n      <span>JOG Films © 2026<\u002Fspan><span>Portfólio · Verão 26<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: { &quot;width&quot;: 1200, &quot;height&quot;: 1500 },\n  &quot;accent&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#a4262a&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;options&quot;: [&quot;#a4262a&quot;, &quot;#c0282c&quot;, &quot;#d8452b&quot;, &quot;#8a1c1c&quot;] },\n  &quot;heroLayout&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;editorial&quot;, &quot;tsType&quot;: &quot;'editorial' | 'ano'&quot;, &quot;options&quot;: [&quot;editorial&quot;, &quot;ano&quot;] },\n  &quot;yearNumerals&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot; }\n}\">\nclass Component extends DCLogic {\n  state = { variation: null };\n\n  currentVariation() {\n    return this.state.variation ?? (this.props.heroLayout ?? 'editorial');\n  }\n\n  renderVals() {\n    const ids = ['F_K28-R_LPw', '6qDHQffgHwQ', 'nuGKxO2yurk', 'owZUQRdhCcg'];\n    const thumb = (id) => 'https://i.ytimg.com/vi/' + id + '/hqdefault.jpg';\n    const watch = (id) => 'https://www.youtube.com/watch?v=' + id;\n    const v = this.currentVariation();\n\n    const projects = ids.map((id, i) => {\n      const num = String(i + 1).padStart(2, '0');\n      return {\n        num,\n        label: num + ' — Reel',\n        poster: thumb(id),\n        watch: watch(id),\n      };\n    });\n\n    return {\n      accent: this.props.accent ?? '#a4262a',\n      isEditorial: v === 'editorial',\n      isAno: v === 'ano',\n      setEditorial: () => this.setState({ variation: 'editorial' }),\n      setAno: () => this.setState({ variation: 'ano' }),\n      heroPoster: thumb(ids[0]),\n      heroWatch: watch(ids[0]),\n      projects,\n      yearOn: this.props.yearNumerals ?? true,\n      igUrl: 'https://instagram.com/jog.films',\n      emailHref: 'mailto:djog.oliver@gmail.com',\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
